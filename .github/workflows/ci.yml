name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
      
      - name: Setup Laravel
        run:  |
             cd server
             install composer --no-interaction --prefer-dist
      
      - name: Setup Node

        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install dependancy
        run: |
             cd client
             npm install
             npm install lint
             npm install test
             npm run build

      - name: build container
        run : docker compose build

   
      # 3. Instal dependencies
      